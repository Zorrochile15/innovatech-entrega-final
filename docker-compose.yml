version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: innovatech-db-local
    environment:
      MYSQL_ROOT_PASSWORD: innovatech2026
      MYSQL_DATABASE: innovatech_local
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend-ventas:
    build: ./innovatech-backend-ventas # Asumiendo que esta es la carpeta
    container_name: ventas-local
    ports:
      - "8080:8080"
    environment:
      - DB_ENDPOINT=db
      - DB_PORT=3306
      - DB_NAME=innovatech_local
      - DB_USERNAME=root
      - DB_PASSWORD=innovatech2026
    depends_on:
      - db

  backend-despacho:
    build: ./innovatech-backend-despachos
    container_name: despachos-local
    ports:
      - "8081:8081"
    environment:
      - DB_ENDPOINT=db
      - DB_PORT=3306
      - DB_NAME=innovatech_local
      - DB_USERNAME=root
      - DB_PASSWORD=innovatech2026
    depends_on:
      - db

  frontend:
    build: ./innovatech-frontend
    container_name: frontend-local
    ports:
      - "80:80"
    environment:
      - VITE_API_VENTAS=http://localhost:8080
      - VITE_API_DESPACHOS=http://localhost:8081

volumes:
  db_data:
